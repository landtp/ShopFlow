# .github/workflows/deploy-gateway.yml
name: Deploy API Gateway

on:
  push:
    branches: [ main ]
    paths:
      - 'src/ApiGateway/**'
      - '.github/workflows/deploy-gateway.yml'

env:
  IMAGE_NAME: api-gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/ApiGateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: api-gateway
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            Jwt__SecretKey=${{ secrets.JWT_SECRET_KEY }}
            Jwt__Issuer=ShopFlow.Identity
            Jwt__Audience=ShopFlow.API